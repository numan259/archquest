name: archquest
description: "Gamified Computer Architecture study app (Patterson & Hennessy, LEGv8/ARMv8)."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.7+1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    # The manifest lives directly in assets/data/; each subject's converted
    # units live in their own subfolder, which Flutter needs listed explicitly.
    # Add a line here when you add a new subject folder.
    - assets/data/
    - assets/data/computer-architecture/

# Launcher icon generation. Source PNG is produced by tool/generate_icon.dart.
# Regenerate platform icons with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/archquest_icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/archquest_icon.png"
